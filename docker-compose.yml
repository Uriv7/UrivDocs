# ══════════════════════════════════════════════════════════════════════════════
#  UrivDocs — Production Docker Compose
#
#  All secrets come from .env file (generated by GitHub Actions — never commit)
#  Start:  docker compose up -d
#  Stop:   docker compose down
#  Logs:   docker compose logs -f [service]
#  Status: docker compose ps
# ══════════════════════════════════════════════════════════════════════════════

services:

  # ── Ollama (LLM Runner) ────────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: urivdocs-ollama
    ports:
      - "11434:11434"
    volumes:
      - urivdocs_models:/root/.ollama
    restart: unless-stopped
    # Resource limits — adjust to your EC2 instance size
    deploy:
      resources:
        limits:
          memory: 6G
        reservations:
          memory: 2G

  # ── FastAPI Backend ────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    image: urivdocs-api:latest
    container_name: urivdocs-api
    ports:
      - "8000:8000"
    volumes:
      - urivdocs_uploads:/app/storage/uploads
      - urivdocs_vectordb:/app/storage/vectordb
    environment:
      # LLM + Embedding config
      - OLLAMA_BASE_URL=http://ollama:11434
      - LLM_MODEL=${LLM_MODEL:-llama3.2:3b}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-all-MiniLM-L6-v2}
      # Vector store
      - VECTOR_STORE=${VECTOR_STORE:-chroma}
      - CHROMA_PERSIST_DIR=/app/storage/vectordb
      # Upload settings
      - UPLOAD_DIR=/app/storage/uploads
      - MAX_UPLOAD_MB=${MAX_UPLOAD_MB:-2048}
      # Chunking
      - CHUNK_SIZE=${CHUNK_SIZE:-256}
      - CHUNK_OVERLAP=${CHUNK_OVERLAP:-32}
      # Retrieval
      - TOP_K=${TOP_K:-5}
      - MIN_SCORE=${MIN_SCORE:-0.15}
      # CORS — set via .env (injected from GitHub Secrets)
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000,http://localhost:5173}
      # AWS credentials — injected from GitHub Secrets via .env
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - S3_BUCKET=${S3_BUCKET:-}
    depends_on:
      - ollama
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 120s
    # Resource limits
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 1G

  # ── React Frontend (Nginx) ─────────────────────────────────────────────────
  ui:
    build:
      context: ./ui
      dockerfile: Dockerfile.ui
    image: urivdocs-ui:latest
    container_name: urivdocs-ui
    ports:
      - "3000:80"
    depends_on:
      - api
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

# ── Named volumes (data persists across container restarts) ───────────────────
volumes:
  urivdocs_uploads:
    name: urivdocs_uploads
  urivdocs_vectordb:
    name: urivdocs_vectordb
  urivdocs_models:
    name: urivdocs_models
