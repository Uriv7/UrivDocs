# ══════════════════════════════════════════════════════════════════
#  UrivDocs — Nginx Reverse Proxy Config (EC2)
#  Place at: /etc/nginx/sites-available/urivdocs
#  Enable:   sudo ln -sf /etc/nginx/sites-available/urivdocs /etc/nginx/sites-enabled/
#  Test:     sudo nginx -t
#  Reload:   sudo systemctl reload nginx
# ══════════════════════════════════════════════════════════════════

server {
    listen 80;
    server_name _;    # Accepts all hostnames — works with IP or domain

    # Allow large file uploads (PDFs, DOCX, etc.)
    client_max_body_size 2048m;
    client_body_timeout 300s;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    # ── Frontend (React App) ────────────────────────────────────
    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_read_timeout 60s;
    }

    # ── API (FastAPI) ───────────────────────────────────────────
    location /api/ {
        proxy_pass http://localhost:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_read_timeout 300s;      # 5 min — LLM responses take time
        proxy_send_timeout 300s;
        client_max_body_size 2048m;

        # SSE (Server-Sent Events) support — needed for streaming AI responses
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header Connection '';
        chunked_transfer_encoding on;
    }

    # ── Health Check ───────────────────────────────────────────
    location /health {
        proxy_pass http://localhost:8000/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_connect_timeout 10s;
        proxy_read_timeout 10s;
    }
}
