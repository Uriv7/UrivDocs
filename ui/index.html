<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>UrivDocs — Local AI Document Intelligence | Ask Your Files Anything</title>
    <meta name="description" content="UrivDocs is a free, privacy-first AI document assistant. Upload PDFs, Word docs, CSVs, images and audio — then ask questions in plain English. 100% local AI, no API keys, no data leaves your machine." />
    <meta name="keywords" content="local AI, document intelligence, PDF question answering, RAG, offline AI, document search, AI chat PDF, private AI, no API key AI, open source document AI, ask PDF, document QA" />
    <meta name="author" content="UrivDocs" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://urivdocs.com/" />

    <!-- Open Graph / Social -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://urivdocs.com/" />
    <meta property="og:title" content="UrivDocs — Ask Your Documents Anything with Local AI" />
    <meta property="og:description" content="Upload any file. Ask any question. Get answers with exact source citations — all running locally on your machine. No cloud, no API keys, complete privacy." />
    <meta property="og:image" content="https://urivdocs.com/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="UrivDocs" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://urivdocs.com/" />
    <meta name="twitter:title" content="UrivDocs — Local AI Document Intelligence" />
    <meta name="twitter:description" content="Chat with your PDFs, Word docs, CSVs and more — 100% locally. No data leaves your machine." />
    <meta name="twitter:image" content="https://urivdocs.com/og-image.png" />

    <!-- PWA / Theme -->
    <meta name="theme-color" content="#7c6af7" />
    <meta name="application-name" content="UrivDocs" />
    <link rel="manifest" href="/manifest.json" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=JetBrains+Mono:wght@300;400;500&family=Instrument+Sans:wght@400;500&display=swap" rel="stylesheet" />

    <!-- Structured Data (JSON-LD) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "UrivDocs",
      "applicationCategory": "ProductivityApplication",
      "operatingSystem": "macOS, Windows, Linux",
      "description": "Local AI document intelligence — upload any file, ask any question, get cited answers. 100% offline, no API keys required.",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "featureList": [
        "PDF question answering",
        "Local AI — no cloud dependency",
        "Source citations with page numbers",
        "Supports PDF, DOCX, CSV, images, audio",
        "100% private — no data leaves your machine"
      ],
      "url": "https://urivdocs.com",
      "creator": {
        "@type": "Organization",
        "name": "UrivDocs"
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
