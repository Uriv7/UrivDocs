# ══════════════════════════════════════════════════════════════════════════════
#  UrivDocs — Production CI/CD Pipeline
#  GitHub Actions → AWS EC2 via SSH
#
#  REQUIRED GITHUB SECRETS (Settings → Secrets and variables → Actions):
#  ┌─────────────────────────┬────────────────────────────────────────────────┐
#  │ Secret Name             │ Value                                          │
#  ├─────────────────────────┼────────────────────────────────────────────────┤
#  │ EC2_HOST                │ Your EC2 public IP or domain (e.g. 1.2.3.4)   │
#  │ EC2_USERNAME            │ ubuntu                                         │
#  │ SSH_PRIVATE_KEY         │ Full contents of your .pem key file            │
#  │ AWS_ACCESS_KEY_ID       │ IAM user access key                            │
#  │ AWS_SECRET_ACCESS_KEY   │ IAM user secret key                            │
#  │ AWS_REGION              │ e.g. us-east-1                                 │
#  │ S3_BUCKET               │ Your S3 bucket name                            │
#  │ DOMAIN_NAME             │ Your domain (or same as EC2_HOST if no domain) │
#  └─────────────────────────┴────────────────────────────────────────────────┘
#
#  Pipeline stages:
#    1. validate   — Python syntax check
#    2. security   — Secret leak scan
#    3. deploy     — SSH into EC2, pull code, rebuild Docker, restart
#    4. healthcheck — Confirm app is live
# ══════════════════════════════════════════════════════════════════════════════

name: 🚀 Deploy UrivDocs to AWS EC2

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: 'Force full Docker rebuild (no cache)'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

# Prevent concurrent deployments — only one deploy at a time
concurrency:
  group: production-deploy
  cancel-in-progress: false

env:
  APP_DIR: /home/ubuntu/urivdocs
  COMPOSE_FILE: docker-compose.yml

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # STAGE 1 — Validate code (fail fast before touching EC2)
  # ────────────────────────────────────────────────────────────────────────────
  validate:
    name: ✅ Validate Code
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install lint dependencies
        run: pip install --quiet pyflakes

      - name: Syntax-check all Python files
        run: |
          echo "━━━ Python Syntax Check ━━━"
          find . -name "*.py" \
            -not -path "./.venv/*" \
            -not -path "./__pycache__/*" \
            -not -path "./node_modules/*" \
            | sort | while read f; do
              python -m py_compile "$f" && echo "  ✓ $f" || { echo "  ✗ FAIL: $f"; exit 1; }
            done
          echo "All Python files passed syntax check"

      - name: Check Docker Compose file is valid YAML
        run: |
          python -c "
          import yaml, sys
          try:
              yaml.safe_load(open('docker-compose.yml'))
              print('✓ docker-compose.yml is valid YAML')
          except yaml.YAMLError as e:
              print(f'✗ docker-compose.yml YAML error: {e}')
              sys.exit(1)
          "

      - name: Verify critical files exist
        run: |
          echo "━━━ Critical File Check ━━━"
          for f in \
            "docker-compose.yml" \
            "Dockerfile.api" \
            "ui/Dockerfile.ui" \
            "requirements.txt" \
            "api/main.py" \
            "scripts/ec2_setup.sh" \
            "scripts/nginx_urivdocs.conf"; do
            [ -f "$f" ] && echo "  ✓ $f" || { echo "  ✗ MISSING: $f"; exit 1; }
          done

  # ────────────────────────────────────────────────────────────────────────────
  # STAGE 2 — Security: make sure no secrets are accidentally committed
  # ────────────────────────────────────────────────────────────────────────────
  security:
    name: 🔒 Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: validate

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Scan for accidentally committed secrets
        run: |
          echo "━━━ Scanning for leaked secrets ━━━"
          FOUND=0

          # Check .env was not committed
          if git ls-files --error-unmatch .env 2>/dev/null; then
            echo "  ✗ CRITICAL: .env file is committed! Remove it immediately."
            FOUND=1
          else
            echo "  ✓ .env not committed"
          fi

          # Check for .pem key files
          PEM_FILES=$(git ls-files "*.pem" "*.key" "*.cert" 2>/dev/null || true)
          if [ -n "$PEM_FILES" ]; then
            echo "  ✗ CRITICAL: Key files found in repo: $PEM_FILES"
            FOUND=1
          else
            echo "  ✓ No .pem/.key files committed"
          fi

          # Scan for obvious secret patterns in Python/config files
          if grep -rn \
            -e "AKIA[0-9A-Z]\{16\}" \
            -e "aws_secret_access_key\s*=\s*['\"][^'\"]\{20,\}" \
            --include="*.py" --include="*.yml" --include="*.yaml" \
            --exclude-dir=".git" . 2>/dev/null | grep -v "os.getenv\|os.environ\|secrets\.\|example\|placeholder"; then
            echo "  ✗ WARNING: Possible hardcoded secrets found above"
            FOUND=1
          else
            echo "  ✓ No hardcoded AWS keys found"
          fi

          [ $FOUND -eq 0 ] && echo "Security scan passed" || exit 1

  # ────────────────────────────────────────────────────────────────────────────
  # STAGE 3 — Deploy to EC2
  # ────────────────────────────────────────────────────────────────────────────
  deploy:
    name: 🚢 Deploy to AWS EC2
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: [validate, security]

    environment:
      name: production
      url: http://${{ secrets.EC2_HOST }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Confirm deployment target
        run: |
          echo "━━━ Deployment Summary ━━━"
          echo "  Target:  EC2 @ ${{ secrets.EC2_HOST }}"
          echo "  Branch:  ${{ github.ref_name }}"
          echo "  Commit:  ${{ github.sha }}"
          echo "  Trigger: ${{ github.event_name }}"
          echo "  Rebuild: ${{ github.event.inputs.force_rebuild || 'false' }}"

      - name: Deploy via SSH to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:            ${{ secrets.EC2_HOST }}
          username:        ${{ secrets.EC2_USERNAME }}
          key:             ${{ secrets.SSH_PRIVATE_KEY }}
          port:            22
          command_timeout: 40m
          script: |
            set -euo pipefail
            echo ""
            echo "══════════════════════════════════════════════════════"
            echo "  UrivDocs Deployment — $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
            echo "══════════════════════════════════════════════════════"

            # ── Navigate to app directory ─────────────────────────────
            cd ${{ env.APP_DIR }}
            echo "[1/8] Working directory: $(pwd)"

            # ── Pull latest code safely ───────────────────────────────
            echo "[2/8] Pulling latest code from GitHub..."
            git fetch origin main
            git reset --hard origin/main
            git log --oneline -3
            echo "Code is up to date"

            # ── Write production .env from GitHub Secrets ─────────────
            # SECURITY: .env is built here from secrets — never in the repo
            echo "[3/8] Writing .env from GitHub Secrets..."
            cat > .env << 'ENVEOF'
            LLM_MODEL=llama3.2:3b
            OLLAMA_BASE_URL=http://ollama:11434
            EMBEDDING_MODEL=all-MiniLM-L6-v2
            VECTOR_STORE=chroma
            CHROMA_PERSIST_DIR=/app/storage/vectordb
            UPLOAD_DIR=/app/storage/uploads
            CHUNK_SIZE=256
            CHUNK_OVERLAP=32
            TOP_K=5
            MIN_SCORE=0.15
            MAX_UPLOAD_MB=2048
            ENVEOF

            # Append secrets (no heredoc — prevents multiline issues)
            printf 'CORS_ORIGINS=http://%s,https://%s,http://localhost:3000\n' \
              '${{ secrets.EC2_HOST }}' '${{ secrets.DOMAIN_NAME }}' >> .env
            printf 'AWS_ACCESS_KEY_ID=%s\n'     '${{ secrets.AWS_ACCESS_KEY_ID }}'     >> .env
            printf 'AWS_SECRET_ACCESS_KEY=%s\n' '${{ secrets.AWS_SECRET_ACCESS_KEY }}' >> .env
            printf 'AWS_REGION=%s\n'            '${{ secrets.AWS_REGION }}'            >> .env
            printf 'S3_BUCKET=%s\n'             '${{ secrets.S3_BUCKET }}'             >> .env
            chmod 600 .env
            echo ".env written (secrets injected, permissions 600)"

            # ── Ensure storage directories exist ──────────────────────
            echo "[4/8] Ensuring storage directories..."
            mkdir -p storage/uploads storage/vectordb storage/models
            echo "Storage directories ready"

            # ── Stop existing containers ──────────────────────────────
            echo "[5/8] Stopping existing containers..."
            docker compose down --remove-orphans --timeout 30 || true
            echo "Containers stopped"

            # ── Build Docker images ───────────────────────────────────
            echo "[6/8] Building Docker images..."
            FORCE_REBUILD="${{ github.event.inputs.force_rebuild || 'false' }}"
            if [ "$FORCE_REBUILD" = "true" ]; then
              echo "Force rebuild: clearing Docker cache..."
              docker compose build --no-cache
            else
              docker compose build
            fi
            echo "Images built successfully"

            # ── Start all containers ──────────────────────────────────
            echo "[7/8] Starting containers..."
            docker compose up -d
            echo "Containers started"

            # ── Pull LLM model if needed ──────────────────────────────
            echo "[8/8] Checking LLM model availability..."
            # Give ollama 20s to start
            for i in $(seq 1 20); do
              docker exec urivdocs-ollama ollama list &>/dev/null && break || sleep 1
            done

            if docker exec urivdocs-ollama ollama list 2>/dev/null | grep -q "llama3.2:3b"; then
              echo "LLM model already available — skipping pull"
            else
              echo "Pulling llama3.2:3b (~2GB)..."
              docker exec urivdocs-ollama ollama pull llama3.2:3b
              echo "LLM model downloaded"
            fi

            # ── Prune old images to save disk ─────────────────────────
            docker image prune -f --filter "until=24h" || true
            echo "Old images pruned"

            # ── Quick local health check ──────────────────────────────
            echo "Waiting 90s for API warm-up..."
            sleep 90
            if curl -sf --max-time 15 http://localhost:8000/health; then
              echo ""
              echo "══════════════════════════════════════════════════════"
              echo "  Deployment SUCCESSFUL — $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
              echo "══════════════════════════════════════════════════════"
            else
              echo "WARNING: Local health check failed — dumping logs"
              docker compose logs --tail=50 api
              exit 1
            fi

  # ────────────────────────────────────────────────────────────────────────────
  # STAGE 4 — External health check (from GitHub runner, not EC2)
  # ────────────────────────────────────────────────────────────────────────────
  healthcheck:
    name: 🏥 Production Health Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: deploy

    steps:
      - name: Wait for full startup
        run: |
          echo "Waiting 30s for final warm-up..."
          sleep 30

      - name: External health check (5 retries)
        run: |
          echo "━━━ External Health Check from GitHub Runner ━━━"
          TARGET="http://${{ secrets.EC2_HOST }}:8000/health"
          echo "Target: $TARGET"
          for i in 1 2 3 4 5; do
            echo "Attempt $i/5..."
            RESPONSE=$(curl -sf --max-time 20 "$TARGET" 2>/dev/null || echo "")
            if echo "$RESPONSE" | grep -q '"status"'; then
              echo ""
              echo "✅ App is LIVE and healthy!"
              echo "Response: $RESPONSE"
              echo ""
              echo "━━━ Deployment Complete ━━━"
              echo "  🌐 Frontend: http://${{ secrets.EC2_HOST }}"
              echo "  🔌 API:      http://${{ secrets.EC2_HOST }}:8000"
              echo "  📚 API Docs: http://${{ secrets.EC2_HOST }}:8000/docs"
              exit 0
            fi
            echo "Not ready yet — waiting 20s..."
            sleep 20
          done
          echo "⚠️  Health check inconclusive after 5 attempts"
          echo "The app may still be warming up. Check manually:"
          echo "  ssh ubuntu@${{ secrets.EC2_HOST }} 'docker compose logs api --tail=50'"
          exit 0
